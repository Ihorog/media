name: Dependabot Auto-Merge

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

# Тільки для Dependabot PRs — якщо actor інший, workflow скіпається повністю
permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot-gate:
    name: Dependabot Gate
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    outputs:
      update-type: ${{ steps.meta.outputs.update-type }}
      safe-to-merge: ${{ steps.meta.outputs.safe-to-merge }}
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Evaluate safety
        run: |
          UPDATE="${{ steps.meta.outputs.update-type }}"
          ECOSYSTEM="${{ steps.meta.outputs.package-ecosystem }}"
          if [[ "$UPDATE" == "version-update:semver-patch" ]] || \
             [[ "$UPDATE" == "version-update:semver-minor" ]] || \
             [[ "$UPDATE" == "version-update:semver-major" && "$ECOSYSTEM" == "github-actions" ]]; then
            echo "safe-to-merge=true" >> "$GITHUB_OUTPUT"
          else
            echo "safe-to-merge=false" >> "$GITHUB_OUTPUT"
          fi

  auto-approve:
    name: Auto-Approve
    runs-on: ubuntu-latest
    needs: dependabot-gate
    if: needs.dependabot-gate.outputs.safe-to-merge == 'true'
    steps:
      - uses: hmarr/auto-approve-action@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

  auto-merge:
    name: Auto-Merge
    runs-on: ubuntu-latest
    needs: [dependabot-gate, auto-approve]
    if: needs.dependabot-gate.outputs.safe-to-merge == 'true'
    steps:
      - name: Enable auto-merge
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" \
            --auto --squash --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
