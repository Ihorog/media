name: assets-check

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "15 3 * * *"

jobs:
  assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check assets manifests
        run: |
          test -f manifests/repo-identity.yaml
          test -f manifests/repo-boundary.yaml
          test -f docs/processes/assets-role.md

      - name: List asset files
        run: |
          find . -maxdepth 3 -type f | sort | head -120
